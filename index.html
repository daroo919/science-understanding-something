<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파동 시뮬레이션</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .toggle-group {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .toggle-btn {
            padding: 8px 20px;
            border: 2px solid #000000;
            background-color: #ffffff;
            color: #000000;
            cursor: pointer;
            font-weight: bold;
        }

        .toggle-btn.active {
            background-color: #000000;
            color: #ffffff;
        }

        .controls {
            width: 100%;
            max-width: 600px;
            border: 2px solid #000000;
            padding: 15px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            width: 80px;
            font-weight: bold;
            font-size: 14px;
        }

        .amp-label { color: #ff0000; }
        .freq-label { color: #0000ff; }

        #amplitude { accent-color: #ff0000; flex: 1; }
        #frequency { accent-color: #0000ff; flex: 1; }

        .value-display {
            width: 50px;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }

        .amp-val { color: #ff0000; }
        .freq-val { color: #0000ff; }

        .canvas-container {
            width: 100%;
            max-width: 600px;
            border: 2px solid #000000;
            position: relative;
            background: #ffffff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 320px;
        }

        .glass-panel {
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            word-break: keep-all;
        }

        .motion-controls-container {
            margin-top: 15px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border: 2px solid #000000;
            padding: 15px;
            box-sizing: border-box;
        }

        .motion-toggle-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ffffff;
            border: 2px solid #000000;
            transition: .3s;
            border-radius: 26px;
        }

        .slider-round:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #000000;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider-round {
            background-color: #000000;
        }

        input:checked + .slider-round:before {
            transform: translateX(24px);
            background-color: #ffffff;
        }

        .motion-label {
            font-size: 14px;
            font-weight: bold;
        }

        .time-slider-row {
            display: flex;
            align-items: center;
        }

        .time-slider-row label {
            width: 120px;
            transition: color 0.3s;
        }

        #time-flow {
            flex: 1;
            accent-color: #000000;
            transition: opacity 0.3s;
        }

        #time-flow:disabled {
            accent-color: #888888;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .disabled-text {
            color: #888888 !important;
        }
    </style>
</head>
<body>

    <div class="toggle-group">
        <button class="toggle-btn active" id="btn-dist" onclick="setMode('dist')">거리 · 위치 그래프</button>
        <button class="toggle-btn" id="btn-time" onclick="setMode('time')">시간 · 위치 그래프</button>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="amplitude" class="amp-label">진폭(A)</label>
            <input type="range" id="amplitude" min="20" max="110" value="60">
            <div class="value-display amp-val" id="amp-val">60</div>
        </div>
        <div class="control-group">
            <label for="frequency" class="freq-label">진동수(f)</label>
            <input type="range" id="frequency" min="1" max="5" value="2" step="0.5">
            <div class="value-display freq-val" id="freq-val">2</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <div class="glass-panel" id="formula-panel"></div>

    <div class="motion-controls-container">
        <div class="motion-toggle-row">
            <span class="motion-label">실시간 움직임 (자동)</span>
            <label class="switch">
                <input type="checkbox" id="motion-switch" onchange="toggleAutoMotion()">
                <span class="slider-round"></span>
            </label>
        </div>
        <div class="time-slider-row">
            <label for="time-flow" id="time-slider-label" class="motion-label">시간의 흐름 (수동)</label>
            <input type="range" id="time-flow" min="0" max="100" value="0" step="0.5">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const ampInput = document.getElementById('amplitude');
        const freqInput = document.getElementById('frequency');
        const ampVal = document.getElementById('amp-val');
        const freqVal = document.getElementById('freq-val');
        const formulaPanel = document.getElementById('formula-panel');
        const motionSwitch = document.getElementById('motion-switch');
        const timeFlowInput = document.getElementById('time-flow');
        const timeSliderLabel = document.getElementById('time-slider-label');
        
        let autoOffset = 0;
        let currentMode = 'dist'; 

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-dist').classList.toggle('active', mode === 'dist');
            document.getElementById('btn-time').classList.toggle('active', mode === 'time');
        }

        function toggleAutoMotion() {
            if (motionSwitch.checked) {
                timeFlowInput.disabled = true;
                timeSliderLabel.classList.add('disabled-text');
            } else {
                timeFlowInput.disabled = false;
                timeSliderLabel.classList.remove('disabled-text');
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 320;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;
            
            const amplitude = parseFloat(ampInput.value);
            const frequency = parseFloat(freqInput.value);
            
            const wavelength = Math.round(width / frequency); 
            const period = (1 / frequency).toFixed(2);
            const speed = (wavelength * frequency).toFixed(0);

            ampVal.textContent = amplitude;
            freqVal.textContent = frequency;

            formulaPanel.innerHTML = `속력(${speed}) = 파장(${wavelength}) / 주기(${period}) = 파장(${wavelength}) × 진동수(${frequency})`;

            ctx.beginPath();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, centerY);
            ctx.lineTo(width, centerY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#000000';
            ctx.font = '12px sans-serif';
            ctx.fillText(currentMode === 'dist' ? '거리' : '시간', width - 30, centerY + 15);

            ctx.beginPath();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;

            let firstCrestX = null;
            let secondCrestX = null;
            let crestY = null;

            const isAuto = motionSwitch.checked;
            const manualOffset = -(parseFloat(timeFlowInput.value) * 0.1);
            const currentOffset = isAuto ? autoOffset : manualOffset;

            // 두 모드 모두 오프셋(움직임)을 동일하게 적용하여 선 전체가 움직이도록 수정
            for (let x = 0; x < width; x++) {
                const angle = (x / width) * Math.PI * 2 * frequency + currentOffset;
                const y = centerY + Math.sin(angle) * amplitude;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                const normalizedAngle = (angle - Math.PI / 2) % (Math.PI * 2);
                if (Math.abs(normalizedAngle) < 0.05 || Math.abs(normalizedAngle - Math.PI * 2) < 0.05) {
                    if (firstCrestX === null && x > width * 0.02) {
                        firstCrestX = x;
                        crestY = y;
                    } else if (firstCrestX !== null && secondCrestX === null && (x - firstCrestX) > (width / frequency) * 0.8) {
                        secondCrestX = x;
                    }
                }
            }
            ctx.stroke();

            // 빨간 점도 선과 한 몸으로 완벽하게 연동되도록 상시 드로잉 (두 모드 공통 적용)
            const fixedX = width * 0.25;
            const pointAngle = (fixedX / width) * Math.PI * 2 * frequency + currentOffset;
            const pointY = centerY + Math.sin(pointAngle) * amplitude;

            ctx.beginPath();
            ctx.fillStyle = '#ff0000';
            ctx.arc(fixedX, pointY, 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.moveTo(fixedX, centerY - amplitude);
            ctx.lineTo(fixedX, centerY + amplitude);
            ctx.stroke();
            ctx.setLineDash([]);

            if (firstCrestX !== null) {
                ctx.beginPath();
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 2;
                ctx.moveTo(firstCrestX, centerY);
                ctx.lineTo(firstCrestX, crestY);
                ctx.stroke();

                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText(`진폭(${amplitude})`, firstCrestX + 8, centerY - (amplitude / 2) + 4);
            }

            if (firstCrestX !== null && secondCrestX !== null) {
                const lineY = crestY - 15;
                ctx.beginPath();
                ctx.strokeStyle = '#0000ff';
                ctx.lineWidth = 2;
                ctx.moveTo(firstCrestX, lineY);
                ctx.lineTo(secondCrestX, lineY);
                ctx.stroke();

                ctx.fillStyle = '#0000ff';
                ctx.font = 'bold 12px sans-serif';
                
                if (currentMode === 'dist') {
                    ctx.fillText(`파장(λ: ${wavelength})`, (firstCrestX + secondCrestX) / 2 - 35, lineY - 8);
                } else {
                    ctx.fillText(`주기(T: ${period}s)`, (firstCrestX + secondCrestX) / 2 - 35, lineY - 8);
                }
            }

            if (isAuto) {
                autoOffset -= 0.04;
            }
            requestAnimationFrame(draw);
        }

        toggleAutoMotion();
        draw();
    </script>
</body>
</html>
