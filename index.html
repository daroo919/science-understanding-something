<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파동 시뮬레이션</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls {
            width: 100%;
            max-width: 600px;
            border: 2px solid #000000;
            padding: 15px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            width: 100px;
            font-weight: bold;
            font-size: 14px;
        }

        .amp-label { color: #ff0000; }
        .freq-label { color: #0000ff; }

        #amplitude {
            accent-color: #ff0000;
            flex: 1;
        }

        #frequency {
            accent-color: #0000ff;
            flex: 1;
        }

        .value-display {
            width: 50px;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }

        .amp-val { color: #ff0000; }
        .freq-val { color: #0000ff; }

        .canvas-container {
            width: 100%;
            max-width: 600px;
            border: 2px solid #000000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <label for="amplitude" class="amp-label">진폭</label>
            <input type="range" id="amplitude" min="10" max="130" value="50">
            <div class="value-display amp-val" id="amp-val">50</div>
        </div>
        <div class="control-group">
            <label for="frequency" class="freq-label">진동수</label>
            <input type="range" id="frequency" min="1" max="10" value="4" step="0.5">
            <div class="value-display freq-val" id="freq-val">4</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="waveCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const ampInput = document.getElementById('amplitude');
        const freqInput = document.getElementById('frequency');
        const ampVal = document.getElementById('amp-val');
        const freqVal = document.getElementById('freq-val');
        
        let offset = 0;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 300;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;
            
            const amplitude = parseFloat(ampInput.value);
            const frequency = parseFloat(freqInput.value);

            ampVal.textContent = amplitude;
            freqVal.textContent = frequency;

            ctx.beginPath();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.moveTo(0, centerY);
            ctx.lineTo(width, centerY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.beginPath();
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;

            for (let x = 0; x < width; x++) {
                const angle = (x / width) * Math.PI * 2 * frequency + offset;
                const y = centerY + Math.sin(angle) * amplitude;

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 1.5;
            ctx.moveTo(width * 0.25, centerY);
            ctx.lineTo(width * 0.25, centerY - amplitude);
            ctx.stroke();
            
            ctx.fillStyle = '#ff0000';
            ctx.font = '12px sans-serif';
            ctx.fillText('진폭', width * 0.25 + 5, centerY - (amplitude / 2));

            offset -= 0.05;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
